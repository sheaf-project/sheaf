name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "I want this feature for these reasons" is more useful than "please add this feature".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or workarounds you're currently using.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to related projects, etc.
