<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark" data-palette="classic">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="darkreader-lock" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/logo-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/logo-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/logo-light.svg" />
    <title>Sheaf</title>
    <meta
      name="description"
      content="Open-source, self-hostable plural system tracking. A privacy-first SimplyPlural alternative — members, fronting, journals, and more."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sheaf" />
    <meta property="og:title" content="Sheaf" />
    <meta
      property="og:description"
      content="Open-source, self-hostable plural system tracking. A privacy-first SimplyPlural alternative — members, fronting, journals, and more."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sheaf" />
    <meta
      name="twitter:description"
      content="Open-source, self-hostable plural system tracking. A privacy-first SimplyPlural alternative — members, fronting, journals, and more."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      // Apply saved theme + palette before first paint to avoid flash.
      // Default mode = dark, default palette = classic; matches the
      // look the app shipped with before the picker existed.
      // Backend-synced values are applied later (after auth + fetch);
      // this script only resolves localStorage so the very first paint
      // never flashes the wrong colours on browsers that have a local
      // pick.
      (function() {
        var mode = localStorage.getItem("sheaf_theme") || "dark";
        var palette = localStorage.getItem("sheaf_palette") || "classic";
        var dark;
        if (mode === "system") {
          dark = window.matchMedia
            && window.matchMedia("(prefers-color-scheme: dark)").matches;
        } else {
          dark = mode === "dark";
        }
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
        document.documentElement.setAttribute("data-palette", palette);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
