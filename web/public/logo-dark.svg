<svg width="1024" height="1024" viewBox="60 60 560 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep midnight purple background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E1065"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <!-- Stronger glass — more visible on dark bg -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.10"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.60"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <!-- Brighter, more saturated strands for dark bg -->
    <linearGradient id="strandA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0ABFC"/>
      <stop offset="100%" style="stop-color:#C084FC"/>
    </linearGradient>
    <linearGradient id="strandB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="strandC" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DDD6FE"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="60" y="60" width="560" height="560" rx="126"/>
    </clipPath>
  </defs>
  <rect x="60" y="60" width="560" height="560" rx="126" fill="url(#bgGrad)"/>
  <g clip-path="url(#iconClip)">
    <ellipse cx="280" cy="400" rx="160" ry="120" fill="#C084FC" opacity="0.25" filter="url(#glow)"/>
    <ellipse cx="420" cy="300" rx="140" ry="100" fill="#818CF8" opacity="0.25" filter="url(#glow)"/>
    <path d="M 220 200 C 200 310 200 370 220 480" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.15" filter="url(#soft)"/>
    <path d="M 340 185 C 340 310 340 370 340 495" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.15" filter="url(#soft)"/>
    <path d="M 460 200 C 480 310 480 370 460 480" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.15" filter="url(#soft)"/>
    <path d="M 210 195 C 190 310 190 375 215 485" stroke="url(#strandC)" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.75"/>
    <path d="M 470 195 C 490 310 490 375 465 485" stroke="url(#strandC)" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.75"/>
    <path d="M 265 188 C 248 310 248 375 268 488" stroke="url(#strandA)" stroke-width="24" stroke-linecap="round" fill="none"/>
    <path d="M 415 188 C 432 310 432 375 412 488" stroke="url(#strandB)" stroke-width="24" stroke-linecap="round" fill="none"/>
    <rect x="168" y="304" width="344" height="72" rx="36" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.42)" stroke-width="1.5"/>
    <rect x="168" y="304" width="344" height="36" rx="36" fill="url(#shineGrad)"/>
    <path d="M 204 376 Q 340 382 476 376" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none"/>
    <ellipse cx="340" cy="210" rx="148" ry="38" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
    <ellipse cx="340" cy="203" rx="148" ry="22" fill="url(#shineGrad)"/>
    <ellipse cx="340" cy="470" rx="148" ry="38" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
    <ellipse cx="340" cy="463" rx="148" ry="20" fill="url(#shineGrad)" opacity="0.5"/>
    <rect x="60" y="60" width="560" height="280" rx="126" fill="url(#shineGrad)" opacity="0.08"/>
  </g>
  <rect x="60" y="60" width="560" height="560" rx="126" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
</svg>
