name: Bug report
description: Bug report
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        **Do not report security vulnerabilities here.** See [SECURITY.md](../blob/main/SECURITY.md) for how to report those privately.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sheaf version / commit
      description: Output of `git rev-parse --short HEAD` or the Docker image tag
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Self-hosted (Docker Compose)
        - Self-hosted (other)
        - Local development
        - Hosted instance
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend logs, browser console errors, etc. Redact any sensitive data.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Postgres/Redis version, anything else relevant
